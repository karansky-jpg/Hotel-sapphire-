<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Sapphire - Order Control Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #030712; }
        .luxury-heading { font-family: 'Cinzel', serif; }
        
        /* Printer Thermal Format Media Optimization Rules */
        @media print {
            body * { visibility: hidden; }
            #printable-receipt, #printable-receipt * { visibility: visible; }
            #printable-receipt { position: absolute; left: 0; top: 0; width: 100%; color: #000 !important; background: #fff !important; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col">

    <header class="bg-slate-950 border-b border-slate-800 p-4 no-print flex justify-between items-center">
        <h1 class="luxury-heading text-sm text-amber-400 tracking-wider">Hotel Sapphire Counter Control</h1>
        <a href="https://karan-digital-menu-agency.vercel.app/#contact" target="_blank" class="text-[11px] text-gray-500 font-mono hover:text-amber-400">
            Karan Digital Menu Agency v1.0
        </a>
    </header>

    <main class="flex-1 p-4 md:p-6 no-print">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-xl font-bold tracking-wide">Live Orders Stream</h2>
                    <p class="text-xs text-gray-400 mt-0.5">Listening live to customer table requests via Supabase API...</p>
                </div>
                <button onclick="fetchIncomingOrders()" class="bg-slate-900 hover:bg-slate-800 border border-slate-700 text-xs px-4 py-2 rounded-lg font-medium transition-all">
                    🔄 Forces Refresh
                </button>
            </div>

            <div id="orders-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <p class="text-sm text-slate-500 col-span-full py-12 text-center">Awaiting data entry pipelines or sync hooks...</p>
            </div>
        </div>
    </main>

    <div id="printable-receipt" class="hidden p-4 font-mono text-xs bg-white text-black max-w-[80mm] mx-auto">
        </div>

    <script>
        const SUPABASE_GET_URL = "https://kvzmmqzyspplqmxetdir.supabase.co/rest/v1/orders?order=created_at.desc";
        const SUPABASE_PATCH_BASE = "https://kvzmmqzyspplqmxetdir.supabase.co/rest/v1/orders";
        const SUPABASE_KEY = "sb_publishable_zI3NcmwRAjXgUg-dStSerA_cusoGsKf";

        let fetchedOrders = [];

        // Fetch Orders Payload Function via API Channels
        async function fetchIncomingOrders() {
            try {
                const response = await fetch(SUPABASE_GET_URL, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) throw new Error("Network status invalid");
                fetchedOrders = await response.json();
                renderControlGrid();
            } catch (err) {
                console.error("Pipeline failure: ", err);
            }
        }

        // Render Dashboard UI
        function renderControlGrid() {
            const container = document.getElementById('orders-grid');
            if (fetchedOrders.length === 0) {
                container.innerHTML = `<p class="text-sm text-slate-500 col-span-full py-12 text-center">No recent orders placed via live database.</p>`;
                return;
            }

            container.innerHTML = fetchedOrders.map(order => {
                const itemsParsed = JSON.parse(order.items || "[]");
                const totalCalculated = parseFloat(order.subtotal || 0) + parseFloat(order.cgst || 0) + parseFloat(order.sgst || 0);
                const orderTime = new Date(order.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                return `
                    <div class="bg-slate-900 border ${order.status === 'completed' ? 'border-emerald-500/30' : 'border-slate-800'} p-4 rounded-xl flex flex-col justify-between shadow-xl">
                        <div>
                            <div class="flex justify-between items-start border-b border-slate-800 pb-2 mb-3">
                                <div>
                                    <span class="bg-amber-500 text-slate-950 font-bold text-[10px] uppercase px-2 py-0.5 rounded-md">${order.table_number}</span>
                                    <p class="text-[10px] text-gray-500 mt-1 font-mono">${orderTime}</p>
                                </div>
                                <span class="text-xs uppercase font-semibold ${order.status === 'completed' ? 'text-emerald-400' : 'text-amber-400'}">${order.status}</span>
                            </div>

                            <div class="space-y-1.5 mb-4">
                                ${itemsParsed.map(i => `
                                    <div class="flex justify-between text-xs text-gray-300">
                                        <span>${i.name} <strong class="text-amber-400 font-mono">x${i.qty}</strong></span>
                                        <span class="text-gray-500">₹${i.price * i.qty}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="border-t border-slate-800/80 pt-3 mt-auto">
                            <div class="flex justify-between items-center text-xs mb-3 font-semibold">
                                <span class="text-gray-400">Total (Inc. Tax):</span>
                                <span class="text-amber-400 font-mono">₹${totalCalculated.toFixed(2)}</span>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="printThermalReceipt('${order.id}')" class="bg-slate-800 hover:bg-slate-700 text-slate-200 font-medium text-xs py-2 rounded-lg transition-colors">
                                    🖨️ Print Receipt
                                </button>
                                ${order.status !== 'completed' ? `
                                    <button onclick="updateOrderStatus('${order.id}', 'completed')" class="bg-emerald-600 hover:bg-emerald-500 text-white font-semibold text-xs py-2 rounded-lg transition-colors">
                                        Complete
                                    </button>
                                ` : `
                                    <div class="text-xs text-emerald-500/80 font-medium text-center my-auto">Processed ✓</div>
                                `}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Target Specific Record to Print Receipt dynamically
        function printThermalReceipt(id) {
            const target = fetchedOrders.find(o => o.id === id);
            if (!target) return;

            const items = JSON.parse(target.items || "[]");
            const sub = parseFloat(target.subtotal || 0);
            const cgst = parseFloat(target.cgst || 0);
            const sgst = parseFloat(target.sgst || 0);
            const grand = sub + cgst + sgst;

            const printArea = document.getElementById('printable-receipt');
            printArea.innerHTML = `
                <div style="text-align: center; margin-bottom: 10px;">
                    <h2 style="font-size: 14px; margin: 0;">HOTEL SAPPHIRE</h2>
                    <p style="margin: 2px 0;">YAMUNA NAGAR</p>
                    <p style="margin: 2px 0;">--- TAX INVOICE ---</p>
                </div>
                <p><strong>Table/Room:</strong> ${target.table_number}</p>
                <p><strong>Date:</strong> ${new Date(target.created_at).toLocaleString()}</p>
                <p>--------------------------------</p>
                <table style="width: 100%; text-align: left; font-size: 11px;">
                    <thead>
                        <tr style="border-bottom: 1px solid #000;">
                            <th>Item</th>
                            <th>Qty</th>
                            <th style="text-align: right;">Amt</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${items.map(i => `
                            <tr>
                                <td>${i.name.substring(0, 18)}</td>
                                <td>${i.qty}</td>
                                <td style="text-align: right;">${(i.price * i.qty).toFixed(2)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
                <p>--------------------------------</p>
                <div style="font-size: 11px;">
                    <div style="display: flex; justify-content: space-between;"><span>Subtotal:</span><span>₹${sub.toFixed(2)}</span></div>
                    <div style="display: flex; justify-content: space-between;"><span>CGST (5%):</span><span>₹${cgst.toFixed(2)}</span></div>
                    <div style="display: flex; justify-content: space-between;"><span>SGST (5%):</span><span>₹${sgst.toFixed(2)}</span></div>
                    <div style="display: flex; justify-content: space-between; font-weight: bold; margin-top: 4px; border-top: 1px dashed #000; pt-2;">
                        <span>Grand Total:</span><span>₹${grand.toFixed(2)}</span>
                    </div>
                </div>
                <div style="text-align: center; margin-top: 15px; font-size: 10px;">
                    <p>Thank You! Visit Again.</p>
                </div>
            `;

            window.print();
        }

        // Update Record Status on Supabase Table Endpoint
        async function updateOrderStatus(id, newStatus) {
            try {
                const response = await fetch(`${SUPABASE_PATCH_BASE}?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({ status: newStatus })
                });

                if (response.ok) {
                    fetchIncomingOrders();
                } else { throw new Error("Patch parsing error"); }
            } catch (err) {
                console.error("Failed status updates: ", err);
            }
        }

        // Initialize Runtime Engine with an Auto-polling Loop interval set to 5000ms
        window.addEventListener('DOMContentLoaded', () => {
            fetchIncomingOrders();
            setInterval(fetchIncomingOrders, 5000);
        });
    </script>
</body>
</html>
