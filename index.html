<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hotel Sapphire - Digital Menu</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle, #0d1b2a 0%, #010811 100%);
            overflow: hidden;
            touch-action: none;
        }
        .luxury-heading {
            font-family: 'Cinzel', serif;
        }
        /* Page Flip Animation Effect */
        .book-container {
            perspective: 1500px;
        }
        .menu-page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            transform-origin: left center;
            transition: transform 0.6s cubic-bezier(0.645, 0.045, 0.355, 1);
            transform-style: preserve-3d;
            backface-visibility: hidden;
            z-index: 1;
        }
        .menu-page.flipped {
            transform: rotateY(-180deg);
            z-index: 0;
        }
        .menu-page.active {
            z-index: 2;
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col justify-between p-4 selection:bg-amber-500 selection:text-black">

    <header class="text-center py-2 z-50">
        <a href="https://karan-digital-menu-agency.vercel.app/#contact" target="_blank" class="luxury-heading text-xs md:text-sm tracking-widest text-amber-400 hover:text-amber-300 transition-all font-semibold border-b border-dashed border-amber-500/40 pb-1">
            Created By. KARAN DIGITAL MENU AGENCY
        </a>
    </header>

    <main class="flex-1 flex items-center justify-center my-4 book-container relative max-w-lg w-full mx-auto h-[70vh] bg-slate-900/60 rounded-2xl border-2 border-amber-500/30 shadow-2xl backdrop-blur-md overflow-hidden">
        
        <div id="cart-toast" class="absolute top-4 right-4 bg-amber-500 text-slate-950 px-4 py-2 rounded-full font-bold text-xs transform scale-0 transition-transform duration-300 z-50 shadow-lg">
            Item Added to Plate! 🍽️
        </div>

        <div id="book" class="w-full h-full relative">
            <div class="menu-page active p-6 flex flex-col justify-between bg-gradient-to-b from-slate-950 to-slate-900" id="page-1">
                <div class="text-center my-auto">
                    <h1 class="luxury-heading text-3xl text-amber-400 tracking-wide mb-2">HOTEL SAPPHIRE</h1>
                    <p class="text-xs text-amber-200/60 tracking-widest uppercase mb-6">Yamuna Nagar</p>
                    <div class="w-24 h-[1px] bg-amber-500 mx-auto mb-6"></div>
                    <p class="text-sm text-gray-300 px-6 italic">Swipe left to open the luxury culinary experience.</p>
                </div>
                <div class="text-center text-xs text-amber-500/40 font-semibold uppercase tracking-widest">Page 1</div>
            </div>
        </div>

        <div class="absolute bottom-4 left-1/2 transform -translate-x-1/2 flex space-x-2 z-40" id="page-dots">
            <span class="w-2 h-2 rounded-full bg-amber-400"></span>
        </div>
    </main>

    <footer class="w-full max-w-lg mx-auto flex justify-between items-center px-2 py-2 z-50">
        <a href="https://www.google.com/search?q=Hotel+sapphire+yamunanagar+reviews" target="_blank" class="bg-slate-900/80 border border-slate-700/60 px-4 py-2.5 rounded-xl text-xs font-semibold tracking-wider text-gray-300 hover:text-amber-400 hover:border-amber-500/40 transition-all flex items-center gap-2 shadow-md">
            <span>⭐ Leave Feedback</span>
        </a>

        <button onclick="toggleCart(true)" class="bg-gradient-to-r from-amber-500 to-amber-600 text-slate-950 font-bold px-5 py-2.5 rounded-xl text-xs tracking-wider uppercase shadow-lg shadow-amber-500/20 active:scale-95 transition-all flex items-center gap-2">
            <span>View Basket</span>
            <span id="cart-count" class="bg-slate-950 text-amber-400 text-[10px] px-2 py-0.5 rounded-full">0</span>
        </button>
    </footer>

    <div id="cart-panel" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 transform translate-x-full transition-transform duration-300 flex justify-end">
        <div class="w-full max-w-md bg-slate-900 h-full p-6 flex flex-col justify-between border-l border-amber-500/20">
            <div>
                <div class="flex justify-between items-center border-b border-slate-800 pb-4">
                    <h2 class="luxury-heading text-lg text-amber-400">Your Selection</h2>
                    <button onclick="toggleCart(false)" class="text-gray-400 hover:text-white text-sm uppercase tracking-widest">Close</button>
                </div>
                
                <div class="mt-4">
                    <label class="text-xs text-amber-500/60 uppercase tracking-wider font-semibold block mb-1">Enter Table / Room No:</label>
                    <input type="text" id="table-number" placeholder="e.g., Table 5" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2 text-sm focus:outline-none focus:border-amber-500 text-amber-400 font-semibold">
                </div>

                <div id="cart-items" class="mt-6 overflow-y-auto max-h-[45vh] space-y-3 pr-2">
                    <p class="text-sm text-gray-500 text-center py-8">Your basket is currently empty.</p>
                </div>
            </div>

            <div class="border-t border-slate-800 pt-4">
                <div class="space-y-1.5 text-xs text-gray-400 mb-4">
                    <div class="flex justify-between"><span>Subtotal</span><span id="subtotal">₹0.00</span></div>
                    <div class="flex justify-between"><span>CGST (5%)</span><span id="cgst">₹0.00</span></div>
                    <div class="flex justify-between"><span>SGST (5%)</span><span id="sgst">₹0.00</span></div>
                    <div class="flex justify-between text-sm font-bold text-amber-400 pt-1 border-t border-dashed border-slate-800">
                        <span>Grand Total</span><span id="grand-total">₹0.00</span>
                    </div>
                </div>
                <button onclick="submitOrderToSupabase()" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-bold py-3 rounded-xl uppercase text-xs tracking-widest active:scale-98 transition-all">
                    Send Order to Kitchen
                </button>
            </div>
        </div>
    </div>

    <script>
        const menuData = {
            "BAR BITES": [
                { name: "CRISPY VEG NUGGETS", price: 345, type: "veg" },
                { name: "CHANNA CHAAT", price: 445, type: "veg" },
                { name: "CHICKEN POP CORN", price: 495, type: "non-veg" },
                { name: "SPINACH LEAF CHAAT", price: 445, type: "veg" },
                { name: "PEANUT MASALA", price: 395, type: "veg" },
                { name: "MASALA PAPAD", price: 245, type: "veg" },
                { name: "FRENCH FRIES", price: 345, type: "veg" }
            ],
            "SOUPS": [
                { name: "KHOW SUEY VEG", price: 495, type: "veg" },
                { name: "KHOW SUEY NON-VEG", price: 595, type: "non-veg" },
                { name: "TIBETAN DUMPLING VEG", price: 395, type: "veg" },
                { name: "MANCHOW SOUP NON-VEG", price: 375, type: "non-veg" },
                { name: "MUSHROOM CAPPUCCINO", price: 325, type: "veg" }
            ],
            "SMALL PLATES": [
                { name: "HONEY CHILLI POTATO", price: 545, type: "veg" },
                { name: "BAKED TEX MEX NACHOS VEG", price: 545, type: "veg" },
                { name: "CORN PEPPER CHEESE ROLL", price: 545, type: "veg" },
                { name: "CAJUN CHICKEN STICKS", price: 595, type: "non-veg" },
                { name: "CRISP BATTER FISH FINGER", price: 945, type: "non-veg" }
            ],
            "INDIAN APPETIZERS": [
                { name: "MALAI BROCCOLI", price: 595, type: "veg" },
                { name: "PANEER TIKKA", price: 545, type: "veg" },
                { name: "DAHI KEBAB", price: 545, type: "veg" },
                { name: "MUTTON SHAMI KEBAB", price: 795, type: "non-veg" },
                { name: "CHAR GRILLED MURGH SEEKH", price: 695, type: "non-veg" }
            ],
            "PIZZERIA & PASTA": [
                { name: "MARGHERITA PIZZA", price: 595, type: "veg" },
                { name: "CHICKEN TIKKA PIZZA", price: 745, type: "non-veg" },
                { name: "SPAGHETTI AGLIO E OLIO", price: 595, type: "veg" },
                { name: "PENNE ALFREDO CHICKEN", price: 695, type: "non-veg" }
            ]
        };

        // Supabase Endpoint Configuration
        const SUPABASE_URL = "https://kvzmmqzyspplqmxetdir.supabase.co/rest/v1/orders";
        const SUPABASE_KEY = "sb_publishable_zI3NcmwRAjXgUg-dStSerA_cusoGsKf";

        let cart = [];
        let currentPage = 0;
        let totalPages = 1;

        // ASMR Web Audio API Synthesizer (Generates organic paper tearing/flipping sound dynamically)
        function playAsmrFlipSound() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                
                // White noise burst for the rustle
                const bufferSize = ctx.sampleRate * 0.15; 
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }

                const noise = ctx.createBufferSource();
                noise.buffer = buffer;

                const filter = ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.setValueAtTime(1200, ctx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.12);
                filter.Q.setValueAtTime(4, ctx.currentTime);

                const gain = ctx.createGain();
                gain.gain.setValueAtTime(0.08, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.14);

                noise.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);

                noise.start();
            } catch (e) { console.log("Audio couldn't play context constraint: ", e); }
        }

        // Generate Book UI View dynamically from Menu Dataset array
        function buildMenuBook() {
            const book = document.getElementById('book');
            const dotsContainer = document.getElementById('page-dots');
            let html = `
                <div class="menu-page active p-6 flex flex-col justify-between bg-gradient-to-b from-slate-950 to-slate-900 shadow-inner" data-index="0">
                    <div class="text-center my-auto">
                        <span class="text-amber-400 text-3xl font-serif">🔱</span>
                        <h1 class="luxury-heading text-2xl text-amber-400 tracking-wider mt-2 mb-1">HOTEL SAPPHIRE</h1>
                        <p class="text-[10px] text-amber-300/40 tracking-widest uppercase mb-6">Exclusive Digital Menu</p>
                        <div class="w-16 h-[1px] bg-amber-500/50 mx-auto mb-6"></div>
                        <p class="text-xs text-gray-400 italic px-4 leading-relaxed">Swipe left-to-right to turn pages. Tap items directly to add them to your order plate.</p>
                    </div>
                    <div class="text-center text-[10px] text-slate-600 font-mono tracking-widest">INTRO</div>
                </div>
            `;

            let pIndex = 1;
            for (const [category, items] of Object.entries(menuData)) {
                html += `
                    <div class="menu-page p-5 flex flex-col justify-between bg-gradient-to-b from-slate-950 via-slate-900 to-slate-950 transform translate-x-full" data-index="${pIndex}">
                        <div>
                            <h2 class="luxury-heading text-base text-amber-400 tracking-wide border-b border-amber-500/20 pb-2 mb-4 uppercase flex justify-between items-center">
                                <span>${category}</span>
                                <span class="text-[9px] text-amber-500/40 tracking-widest font-sans">Menu</span>
                            </h2>
                            <div class="space-y-3.5 overflow-y-auto max-h-[50vh] pr-1">
                                ${items.map(item => `
                                    <div onclick="addToCart('${item.name.replace(/'/g, "\\'")}', ${item.price})" class="flex justify-between items-start gap-4 group cursor-pointer active:bg-slate-800/40 p-1.5 rounded-lg transition-all">
                                        <div class="flex-1">
                                            <div class="flex items-center gap-1.5">
                                                <span class="text-xs ${item.type === 'veg' ? 'text-green-500' : 'text-red-500'}">●</span>
                                                <h3 class="text-xs font-semibold text-gray-200 group-hover:text-amber-400 transition-colors uppercase tracking-wide">${item.name}</h3>
                                            </div>
                                        </div>
                                        <span class="text-xs font-mono font-bold text-amber-500">₹${item.price}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        <div class="text-center text-[10px] text-amber-500/30 font-mono">PAGE ${pIndex + 1}</div>
                    </div>
                `;
                pIndex++;
            }
            
            book.innerHTML = html;
            totalPages = pIndex;

            // Generate Nav Page Control Dots
            dotsContainer.innerHTML = Array.from({length: totalPages}).map((_, i) => 
                `<span class="w-1.5 h-1.5 rounded-full transition-all ${i === 0 ? 'bg-amber-400 w-3' : 'bg-slate-700'}"></span>`
            ).join('');
        }

        // Page Turn Navigation Mechanics
        function updatePageTransitions(direction) {
            const pages = document.querySelectorAll('.menu-page');
            const dots = document.querySelectorAll('#page-dots span');
            playAsmrFlipSound();

            pages.forEach((page, i) => {
                const idx = parseInt(page.getAttribute('data-index'));
                if (idx < currentPage) {
                    page.className = "menu-page flipped p-5 flex flex-col justify-between bg-gradient-to-b from-slate-950 to-slate-900";
                } else if (idx === currentPage) {
                    page.className = "menu-page active p-5 flex flex-col justify-between bg-gradient-to-b from-slate-950 to-slate-900";
                } else {
                    page.className = "menu-page p-5 flex flex-col justify-between bg-gradient-to-b from-slate-950 to-slate-900 transform translate-x-full";
                }
            });

            dots.forEach((dot, i) => {
                if (i === currentPage) {
                    dot.className = "w-3 h-1.5 rounded-full bg-amber-400 transition-all";
                } else {
                    dot.className = "w-1.5 h-1.5 rounded-full bg-slate-700 transition-all";
                }
            });
        }

        // Mobile Native Touch Swipe Gestures Engine
        let startX = 0;
        document.getElementById('book').addEventListener('touchstart', e => { startX = e.touches[0].clientX; });
        document.getElementById('book').addEventListener('touchend', e => {
            const diffX = startX - e.changedTouches[0].clientX;
            if (Math.abs(diffX) > 60) {
                if (diffX > 0 && currentPage < totalPages - 1) { currentPage++; updatePageTransitions('next'); }
                else if (diffX < 0 && currentPage > 0) { currentPage--; updatePageTransitions('prev'); }
            }
        });

        // Cart Actions Engine
        function toggleCart(open) {
            document.getElementById('cart-panel').style.transform = open ? "translateX(0)" : "translateX(100%)";
        }

        function addToCart(name, price) {
            const existing = cart.find(i => i.name === name);
            if (existing) existing.qty++;
            else cart.push({ name, price, qty: 1 });
            
            // Pop added feedback message toast
            const toast = document.getElementById('cart-toast');
            toast.style.transform = "scale(1)";
            setTimeout(() => toast.style.transform = "scale(0)", 900);
            
            renderCartUI();
        }

        function changeQty(name, delta) {
            const idx = cart.findIndex(i => i.name === name);
            if (idx === -1) return;
            cart[idx].qty += delta;
            if (cart[idx].qty <= 0) cart.splice(idx, 1);
            renderCartUI();
        }

        function renderCartUI() {
            const wrapper = document.getElementById('cart-items');
            document.getElementById('cart-count').innerText = cart.reduce((a, b) => a + b.qty, 0);

            if (cart.length === 0) {
                wrapper.innerHTML = `<p class="text-sm text-gray-500 text-center py-8">Your basket is empty.</p>`;
                document.getElementById('subtotal').innerText = "₹0.00";
                document.getElementById('cgst').innerText = "₹0.00";
                document.getElementById('sgst').innerText = "₹0.00";
                document.getElementById('grand-total').innerText = "₹0.00";
                return;
            }

            wrapper.innerHTML = cart.map(item => `
                <div class="flex justify-between items-center bg-slate-950/50 p-2.5 rounded-lg border border-slate-800/40">
                    <div>
                        <h4 class="text-xs font-semibold text-gray-200 uppercase">${item.name}</h4>
                        <p class="text-[10px] text-amber-500 font-mono mt-0.5">₹${item.price} each</p>
                    </div>
                    <div class="flex items-center space-x-2.5">
                        <button onclick="changeQty('${item.name.replace(/'/g, "\\'")}', -1)" class="w-6 h-6 rounded bg-slate-800 text-gray-300 font-bold text-xs flex items-center justify-center">-</button>
                        <span class="text-xs font-mono font-bold w-4 text-center">${item.qty}</span>
                        <button onclick="changeQty('${item.name.replace(/'/g, "\\'")}', 1)" class="w-6 h-6 rounded bg-slate-800 text-gray-300 font-bold text-xs flex items-center justify-center">+</button>
                    </div>
                </div>
            `).join('');

            const sub = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            const gstCalculated = sub * 0.05; // 5% GST Request Configuration Parameters
            const grand = sub + (gstCalculated * 2);

            document.getElementById('subtotal').innerText = `₹${sub.toFixed(2)}`;
            document.getElementById('cgst').innerText = `₹${gstCalculated.toFixed(2)}`;
            document.getElementById('sgst').innerText = `₹${gstCalculated.toFixed(2)}`;
            document.getElementById('grand-total').innerText = `₹${grand.toFixed(2)}`;
        }

        // Supabase Database Live Storage Request Execution
        async function submitOrderToSupabase() {
            const tableNo = document.getElementById('table-number').value.trim();
            if (!tableNo) { alert("Please provide a Table/Room Number before ordering!"); return; }
            if (cart.length === 0) { alert("Your basket is empty!"); return; }

            const orderPayload = {
                table_number: tableNo,
                items: JSON.stringify(cart),
                subtotal: cart.reduce((a, b) => a + (b.price * b.qty), 0),
                cgst: cart.reduce((a, b) => a + (b.price * b.qty), 0) * 0.05,
                sgst: cart.reduce((a, b) => a + (b.price * b.qty), 0) * 0.05,
                status: 'pending',
                created_at: new Date().toISOString()
            };

            try {
                const response = await fetch(SUPABASE_URL, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(orderPayload)
                });

                if (response.ok) {
                    alert("🍽️ Order sent successfully to the kitchen counter!");
                    cart = [];
                    document.getElementById('table-number').value = "";
                    renderCartUI();
                    toggleCart(false);
                } else { throw new Error("Server transmission issue"); }
            } catch (err) {
                alert("Database Connection Error. Please verify network access settings.");
                console.error(err);
            }
        }

        // Initialize Window Frame Lifecycle
        window.addEventListener('DOMContentLoaded', buildMenuBook);
    </script>
</body>
</html>
